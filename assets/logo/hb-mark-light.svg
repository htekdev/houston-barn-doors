<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Houston's Barn Doors — HB monogram">
  <!-- Modern square mark: black tile, white slab-serif HB -->
  <rect width="100" height="100" fill="#0d0d0d"/>
  <g fill="#ffffff">
    <!-- H — thick slab-serif -->
    <!-- top serif -->
    <rect x="8" y="22" width="34" height="5"/>
    <!-- bottom serif -->
    <rect x="8" y="73" width="34" height="5"/>
    <!-- left vertical -->
    <rect x="15" y="22" width="7" height="56"/>
    <!-- right vertical -->
    <rect x="28" y="22" width="7" height="56"/>
    <!-- crossbar -->
    <rect x="15" y="47" width="20" height="6"/>

    <!-- B — thick slab-serif -->
    <!-- top serif -->
    <rect x="52" y="22" width="24" height="5"/>
    <!-- bottom serif -->
    <rect x="52" y="73" width="28" height="5"/>
    <!-- vertical stem -->
    <rect x="58" y="22" width="7" height="56"/>
    <!-- top lobe (rounded right side) -->
    <path d="M65 27 h10 a11 11 0 0 1 0 22 h-10 z"/>
    <!-- bottom lobe (rounded right side, slightly larger) -->
    <path d="M65 49 h12 a12 12 0 0 1 0 24 h-12 z"/>
  </g>
</svg>
